server:
  port: 8088

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: shop-service
          uri: lb://shop-service
          predicates:
            - Path=/api/shop/**
        - id: coupon-service
          uri: lb://coupon-service
          predicates:
            - Path=/api/coupon/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payment/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
    sentinel:
      transport:
        dashboard: localhost:8858
      scg:
        fallback:
          mode: response
          response-status: 429
          response-body: '{"code":429,"message":"请求过于频繁，请稍后重试"}'

jwt:
  secret: shop-coupon-platform-jwt-secret-key-2025
  whitelist:
    - /api/auth/login
    - /api/auth/register
    - /api/auth/refresh
    - /api/shop/products
    - /api/shop/products/**
    - /api/inventory/**
    - /api/coupon/templates/active
