# ============================================================
# Nacos Server Configuration - Standalone Mode with MySQL
# ============================================================

# Server mode: standalone (single node for development)
nacos.core.auth.enabled=false
nacos.core.auth.system.type=nacos

# Use embedded derby for simplicity in Docker (or switch to MySQL below)
# To use MySQL, uncomment the following:
# spring.datasource.platform=mysql
# db.num=1
# db.url.0=jdbc:mysql://mysql:3306/nacos?characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=UTC
# db.user.0=root
# db.password.0=123456
