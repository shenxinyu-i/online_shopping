# ============================================================
# Seata Server Configuration - TC Server with Nacos Registry
# ============================================================

server:
  port: 7091

spring:
  application:
    name: seata-server

logging:
  config: classpath:logback-spring.xml
  file:
    path: ${user.home}/logs/seata

console:
  user:
    username: seata
    password: seata

seata:
  security:
    secretKey: seata-server-secret-key-2025
    tokenValidityInMilliseconds: 86400000
  config:
    type: nacos
    nacos:
      server-addr: nacos:8848
      namespace: ""
      group: SEATA_GROUP
      username: nacos
      password: nacos
      data-id: seataServer.properties
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: nacos:8848
      namespace: ""
      group: SEATA_GROUP
      username: nacos
      password: nacos
  server:
    service-port: 8091
  store:
    mode: file
    file:
      dir: file_store/data
      max-branch-session-size: 16384
      max-global-session-size: 512
      file-write-buffer-cache-size: 16384
      session-reload-read-size: 100
      flush-disk-mode: async
